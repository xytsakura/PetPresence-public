name: Bug report
description: Report a reproducible PetPresence bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not upload private pet media, API keys, provider URLs, event logs, extracted frames, or generated reports unless you have intentionally prepared them for publication.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Creator CLI
        - Desktop runtime
        - Alpha WebM conversion
        - Provider adapter
        - Agent recipe or documentation
        - Release or CI
        - Experimental observer/event/report module
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Linux, etc.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node and npm versions
      placeholder: node -v; npm -v
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Paste the exact commands. Redact private paths if needed.
      render: powershell
      placeholder: |
        npm run pet:doctor
        npm run pet:validate -- --pet-id pet_demo
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Include relevant output from pet:doctor, pet:validate, verify:quick, or release:verify.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, .env contents, private pet media, generated paid-model outputs, frames, event logs, and reports from this issue.
          required: true
