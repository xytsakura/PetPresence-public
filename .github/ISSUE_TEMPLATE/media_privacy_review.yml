name: Media or privacy review
description: Ask whether a file, fixture, or generated output is safe to publish.
title: "[Privacy]: "
labels:
  - privacy
  - media-review
body:
  - type: markdown
    attributes:
      value: |
        Use this before publishing media, generated videos, event logs, frames, reports, or provider outputs. When unsure, keep the file private.
  - type: textarea
    id: files
    attributes:
      label: Files or paths under review
      description: Use repo-relative paths when possible. Do not attach private media unless publication is intentional.
      render: text
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - Synthetic fixture generated by this repository
        - User-provided personal pet media
        - Paid video model output
        - Third-party media
        - Extracted frame, event log, report, or output artifact
        - Unsure
    validations:
      required: true
  - type: textarea
    id: rights
    attributes:
      label: Publication rights and context
      description: Explain why this can or cannot be published.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reviewed docs/media_and_data_policy.md.
          required: true
        - label: I checked that no API keys, account names, private homes, people, addresses, provider URLs, frames, events, or reports are unintentionally exposed.
          required: true
