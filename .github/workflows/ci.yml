name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quick-verify:
    name: Quick Verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Run quick verification
        run: npm run verify:quick
