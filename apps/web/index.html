<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetPresence — Experimental Pet Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --cream: #FDF6EC;
      --warm-white: #FFF9F0;
      --card-bg: #FFFFFF;
      --terracotta: #D4805A;
      --terracotta-deep: #C06A42;
      --sage: #6B9E80;
      --sage-light: #A8D5BA;
      --amber: #E8B84B;
      --amber-soft: #F5DFA0;
      --bark: #3D2C22;
      --bark-light: #6B5748;
      --muted: #9B8B7A;
      --border-warm: #EDE3D5;
      --shadow-warm: rgba(61, 44, 34, 0.08);
      --shadow-deep: rgba(61, 44, 34, 0.15);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font-display: 'Noto Serif SC', 'Georgia', serif;
      --font-body: 'Noto Sans SC', -apple-system, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--bark);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Grain Texture Overlay ===== */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      padding: 72px 24px 56px;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 180%;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(212, 128, 90, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(107, 158, 128, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(232, 184, 75, 0.08) 0%, transparent 40%);
      z-index: 0;
    }

    .hero > * { position: relative; z-index: 1; }

    .brand {
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      margin-bottom: 16px;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--bark);
    }

    .brand-name em {
      font-style: normal;
      color: var(--terracotta);
    }

    .hero-subtitle {
      font-family: var(--font-display);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 400;
      color: var(--bark-light);
      line-height: 1.6;
      max-width: 520px;
      margin: 0 auto 28px;
    }

    .shelter-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      background: white;
      border: 1.5px solid var(--border-warm);
      border-radius: 40px;
      font-size: 14px;
      color: var(--sage);
      font-weight: 500;
      box-shadow: 0 2px 12px var(--shadow-warm);
    }

    .shelter-dot {
      width: 8px;
      height: 8px;
      background: var(--sage);
      border-radius: 50%;
      position: relative;
    }

    .shelter-dot::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--sage);
      opacity: 0.3;
      animation: pulse-ring 2.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.8); opacity: 0; }
    }

    /* ===== Stats Bar ===== */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 20px 24px 40px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 900;
      color: var(--terracotta);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 400;
    }

    .stat-divider {
      width: 1px;
      background: var(--border-warm);
      align-self: stretch;
    }

    /* ===== Section Title ===== */
    .section-header {
      text-align: center;
      padding: 0 24px 36px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      color: var(--bark);
      margin-bottom: 8px;
    }

    .section-desc {
      font-size: 15px;
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto;
    }

    /* ===== Pet Grid ===== */
    .pet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 28px 64px;
    }

    /* ===== Pet Card ===== */
    .pet-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 2px 16px var(--shadow-warm);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
      opacity: 0;
      transform: translateY(24px);
      animation: card-in 0.6s ease forwards;
    }

    .pet-card:nth-child(1) { animation-delay: 0.1s; }
    .pet-card:nth-child(2) { animation-delay: 0.2s; }
    .pet-card:nth-child(3) { animation-delay: 0.3s; }
    .pet-card:nth-child(4) { animation-delay: 0.4s; }
    .pet-card:nth-child(5) { animation-delay: 0.5s; }

    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .pet-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px var(--shadow-deep);
    }

    .pet-card.disabled {
      opacity: 0.85;
    }

    .pet-card.disabled:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--shadow-warm);
    }

    /* ===== Card Image ===== */
    .card-photo {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
      background: linear-gradient(145deg, #F5EDE3, #EDE3D5);
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pet-card:hover .card-photo img {
      transform: scale(1.04);
    }

    .status-pill {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      letter-spacing: 0.3px;
    }

    .status-pill.available {
      background: rgba(107, 158, 128, 0.88);
      color: white;
    }

    .status-pill.treating {
      background: rgba(232, 184, 75, 0.88);
      color: #5D4037;
    }

    .card-photo::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(transparent, rgba(255,255,255,0.6));
      pointer-events: none;
    }

    /* ===== Card Body ===== */
    .card-body {
      padding: 22px 24px 24px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .pet-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--bark);
    }

    .gender-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .gender-badge.male { background: #E3F0FC; color: #5B9BD5; }
    .gender-badge.female { background: #FCE4EC; color: #E57373; }

    .pet-breed {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 16px;
    }

    .pet-traits {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .trait-tag {
      padding: 4px 12px;
      background: var(--cream);
      border-radius: 6px;
      font-size: 12px;
      color: var(--bark-light);
      font-weight: 500;
    }

    .pet-desc {
      font-size: 14px;
      line-height: 1.7;
      color: var(--bark-light);
      margin-bottom: 20px;
    }

    /* ===== Card Actions ===== */
    .card-action {
      padding-top: 4px;
    }

    .btn-summon {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, var(--terracotta), var(--terracotta-deep));
      color: white;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 16px rgba(212, 128, 90, 0.3);
    }

    .btn-summon:hover {
      box-shadow: 0 6px 24px rgba(212, 128, 90, 0.45);
      transform: translateY(-2px);
    }

    .btn-summon:active { transform: translateY(0); }

    .btn-summon.loading {
      opacity: 0.75;
      pointer-events: none;
    }

    .btn-summon.success {
      background: linear-gradient(135deg, var(--sage), #5A8F6F);
      box-shadow: 0 4px 16px rgba(107, 158, 128, 0.3);
    }

    .btn-coming-soon {
      width: 100%;
      padding: 14px;
      border: 2px dashed var(--border-warm);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      user-select: none;
      background: transparent;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      pointer-events: none;
    }

    .toast {
      padding: 14px 28px;
      background: white;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 32px var(--shadow-deep);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: auto;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { border-left: 4px solid var(--sage); }
    .toast.error { border-left: 4px solid var(--terracotta); }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 40px 24px 48px;
      border-top: 1px solid var(--border-warm);
      margin: 0 24px;
    }

    .footer-brand {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--bark);
      margin-bottom: 6px;
    }

    .footer-brand em {
      font-style: normal;
      color: var(--terracotta);
    }

    .footer-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .footer-tag {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      background: var(--cream);
      border-radius: 4px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .hero { padding: 48px 20px 40px; }
      .stats-bar { gap: 24px; }
      .stat-value { font-size: 28px; }
      .pet-grid { padding: 0 16px 48px; gap: 20px; grid-template-columns: 1fr; }
      .card-photo { height: 220px; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .pet-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header class="hero">
    <div class="brand">
      <span class="brand-name">Pet<em>Presence</em></span>
    </div>
    <p class="hero-subtitle">实验页面：从样例宠物卡片启动本地桌宠预览</p>
    <div class="shelter-badge">
      <span class="shelter-dot"></span>
      <span>Legacy hackathon demo · 非默认开源主线</span>
    </div>
  </header>

  <section class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="total-count">0</div>
      <div class="stat-label">样例宠物</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="adoptable-count">0</div>
      <div class="stat-label">可启动</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value">MVP</div>
      <div class="stat-label">实验模块</div>
    </div>
  </section>

  <section class="section-header">
    <h2 class="section-title">样例宠物启动器</h2>
    <p class="section-desc">这个页面保留黑客松云领养叙事作为实验入口；开源主线请使用 README 中的 creator pipeline。</p>
  </section>

  <main class="pet-grid" id="pet-grid"></main>

  <div class="toast-container">
    <div class="toast" id="toast"></div>
  </div>

  <footer>
    <div class="footer-brand">Pet<em>Presence</em></div>
    <p class="footer-note">Experimental launcher for local desktop pet preview</p>
    <span class="footer-tag">LEGACY DEMO</span>
  </footer>

  <script>
    async function loadPets() {
      try {
        const res = await fetch("/api/shelter-pets");
        if (!res.ok) throw new Error("Failed to load");
        const pets = await res.json();
        renderPets(pets);
        updateStats(pets);
      } catch {
        showToast("加载失败，请确认服务器已启动", "error");
      }
    }

    function updateStats(pets) {
      document.getElementById("total-count").textContent = pets.length;
      document.getElementById("adoptable-count").textContent =
        pets.filter(p => p.status === "可领养").length;
    }

    function renderPets(pets) {
      document.getElementById("pet-grid").innerHTML = pets.map(createCard).join("");
    }

    function createCard(pet) {
      const statusClass = pet.status === "治疗中" ? "treating" : "available";
      const genderClass = pet.gender === "男孩" ? "male" : "female";
      const genderIcon = pet.gender === "男孩" ? "♂" : "♀";

      const action = pet.adoptable
        ? `<button class="btn-summon" onclick="launchPet('${esc(pet.id)}', this)" id="btn-${esc(pet.id)}">
             <span>✦</span> 启动桌宠
           </button>`
        : `<div class="btn-coming-soon">
             <span>•</span> 未接入桌宠素材
           </div>`;

      return `
        <article class="pet-card${pet.adoptable ? "" : " disabled"}">
          <div class="card-photo">
            <img src="${esc(pet.image)}" alt="${esc(pet.name)}" loading="lazy"
                 onerror="this.style.display='none'">
            <span class="status-pill ${statusClass}">${esc(pet.status)}</span>
          </div>
          <div class="card-body">
            <div class="card-header">
              <h3 class="pet-name">${esc(pet.name)}</h3>
              <span class="gender-badge ${genderClass}">${genderIcon}</span>
            </div>
            <div class="pet-breed">${esc(pet.breed)}</div>
            <div class="pet-traits">
              <span class="trait-tag">${esc(pet.age)}</span>
              <span class="trait-tag">${esc(pet.weight)}</span>
            </div>
            <p class="pet-desc">${esc(pet.description)}</p>
            <div class="card-action">${action}</div>
          </div>
        </article>
      `;
    }

    async function launchPet(petId, btn) {
      btn.classList.add("loading");
      btn.innerHTML = '<span>◌</span> 正在唤醒...';

      try {
        const res = await fetch("/api/launch-pet", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pet_id: petId })
        });
        const data = await res.json();

        if (data.ok) {
          btn.classList.remove("loading");
          btn.classList.add("success");
          btn.innerHTML = '<span>✓</span> 已启动，桌宠即将出现';
          showToast("桌宠已启动，请查看你的桌面。", "success");
        } else {
          throw new Error(data.error || "Launch failed");
        }
      } catch (err) {
        btn.classList.remove("loading");
        btn.innerHTML = '<span>✦</span> 启动桌宠';
        showToast("启动失败：" + err.message, "error");
      }
    }

    function showToast(msg, type) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast " + type + " visible";
      setTimeout(() => t.classList.remove("visible"), 4000);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    loadPets();
  </script>
</body>
</html>
